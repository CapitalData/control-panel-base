name: Production Deployment

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:  # Allow manual trigger
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        cd GUI_and_components/learning_platform
        pip install -r requirements.txt
        
    - name: Run comprehensive tests
      run: |
        cd GUI_and_components/learning_platform
        python -c "
        import sys
        sys.path.append('.')
        from config.production import ProductionConfig
        
        # Test production configuration
        config = ProductionConfig()
        warnings = config.validate_production_settings()
        
        if warnings:
            print('⚠️  Production configuration warnings:')
            for warning in warnings:
                print(f'  {warning}')
        else:
            print('✅ Production configuration is valid')
            
        # Test app initialization
        import app
        print('✅ Application ready for production')
        "
        
    - name: Build production Docker image
      run: |
        cd GUI_and_components/learning_platform
        docker build -f Dockerfile.prod -t learning-platform:prod .
        echo "✅ Production Docker image built successfully"
        
    - name: Test production container
      run: |
        cd GUI_and_components/learning_platform
        # Start container in background
        docker run -d --name test-prod -p 8050:8050 \
          -e FLASK_ENV=production \
          -e DEBUG=False \
          -e SECRET_KEY=test-key-for-ci \
          learning-platform:prod
        
        # Wait for startup
        sleep 10
        
        # Test health endpoint
        if curl -f http://localhost:8050/_dash-dependencies; then
          echo "✅ Production container health check passed"
        else
          echo "❌ Production container health check failed"
          docker logs test-prod
          exit 1
        fi
        
        # Cleanup
        docker stop test-prod
        docker rm test-prod

  security-check:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run security scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './GUI_and_components/learning_platform'
        
    - name: Check for production secrets
      run: |
        cd GUI_and_components/learning_platform
        # Check for potential secret leaks
        if grep -r "dev-key" . --exclude-dir=.git --exclude="*.md" --exclude="*.yml"; then
          echo "❌ Found development keys in production files!"
          exit 1
        fi
        echo "✅ No development secrets found in production files"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test, security-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    
    steps:
    - name: Deploy to staging
      run: |
        echo "🚀 Deploying to staging environment..."
        echo "This would typically:"
        echo "  - Deploy to staging server"
        echo "  - Run integration tests"
        echo "  - Perform smoke tests"
        echo "✅ Staging deployment completed!"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [test, security-check, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    
    steps:
    - name: Deploy to production
      run: |
        echo "🚀 Deploying to production environment..."
        echo "Version: ${{ github.ref }}"
        echo "This would typically:"
        echo "  - Create production backup"
        echo "  - Deploy to production servers"
        echo "  - Run post-deployment checks"
        echo "  - Send deployment notifications"
        echo "✅ Production deployment completed!"
        
    - name: Create deployment summary
      run: |
        echo "📊 Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "===================" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Deployed by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY